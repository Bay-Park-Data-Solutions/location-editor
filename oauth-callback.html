<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Authenticating…</title>
  <script src="https://js.arcgis.com/4.29/"></script>
</head>
<body>
  <script>
    // Try the standard ArcGIS SDK approach first
    require(["esri/identity/IdentityManager"], function(IdentityManager) {
      try {
        IdentityManager.setOAuthResponseHash(location.hash || location.search);
      } catch(e) {
        console.warn("SDK approach failed, trying manual:", e);
        // Fallback: manually send token back to opener via postMessage
        if (window.opener) {
          window.opener.postMessage(
            { type: "oauth-callback", hash: location.hash, search: location.search },
            "https://bay-park-data-solutions.github.io"
          );
        }
      } finally {
        setTimeout(function() { window.close(); }, 1000);
      }
    });
  </script>
</body>
</html>
