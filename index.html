<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Location Editor</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css"/>
  <script src="https://js.arcgis.com/4.29/"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f6f8; --surface: #ffffff; --surface2: #f0f2f5;
      --border: #e2e5ea; --border2: #cdd1d9;
      --accent: #0070f3; --accent-dk: #0058c4;
      --success: #16a34a; --warn: #d97706; --danger: #dc2626;
      --text: #111318; --text-2: #4b5360; --text-3: #8a93a3;
      --radius: 10px; --radius-sm: 6px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 300; }
    #loading-screen.hidden { display: none; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p { font-size: 14px; color: var(--text-3); }
    #error-screen { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 300; }
    #error-screen.visible { display: flex; }
    .error-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 48px; width: 420px; max-width: 90vw; box-shadow: var(--shadow-lg); text-align: center; display: flex; flex-direction: column; gap: 16px; }
    .error-card h2 { font-size: 18px; font-weight: 600; }
    .error-card p { font-size: 14px; color: var(--text-2); line-height: 1.6; }
    .btn-retry { padding: 10px 24px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    #app { position: fixed; inset: 0; display: none; flex-direction: column; }
    #app.visible { display: flex; }
    #header { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; z-index: 100; }
    .header-logo { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-logo svg { width: 16px; height: 16px; fill: white; }
    #app-title { font-size: 14px; font-weight: 600; white-space: nowrap; }
    #layer-select-wrap { margin-left: 8px; }
    #layer-select-wrap.hidden { display: none; }
    #layer-select { height: 32px; padding: 0 10px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--surface2); color: var(--text); cursor: pointer; outline: none; max-width: 260px; }
    #user-badge { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    #user-name { font-size: 13px; color: var(--text-2); }
    #btn-signout { font-size: 12px; color: var(--text-3); background: none; border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; cursor: pointer; font-family: inherit; }
    #map-wrap { flex: 1; position: relative; }
    #viewDiv { position: absolute; inset: 0; }
    #panel { position: absolute; top: 12px; right: 12px; width: 280px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; z-index: 50; }
    #panel-header { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    #panel-header-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-3); }
    #panel-feature-name { font-size: 15px; font-weight: 600; margin-top: 2px; }
    #panel-body { padding: 14px; }
    #empty-state { font-size: 13px; color: var(--text-3); line-height: 1.6; text-align: center; padding: 4px 0 8px; }
    .coord-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .coord-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; }
    .coord-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-3); margin-bottom: 3px; }
    .coord-value { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 500; }
    #panel-hint { font-size: 12px; color: var(--text-3); margin-top: 12px; display: flex; align-items: flex-start; gap: 6px; line-height: 1.5; }
    #status-bar { display: flex; align-items: center; gap: 7px; padding: 9px 14px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-3); }
    #status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); flex-shrink: 0; transition: background 0.25s; }
    #status-dot.saving { background: var(--warn); animation: blink 0.7s infinite; }
    #status-dot.saved  { background: var(--success); }
    #status-dot.error  { background: var(--danger); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .coord-input {
      width: 100%; background: none; border: none; outline: none;
      font-size: 13px; font-family: 'JetBrains Mono', monospace;
      color: var(--accent); font-weight: 500; padding: 0;
      cursor: text;
    }
    .coord-input:focus { color: var(--accent-dk); }
    #btn-update-coords {
      width: 100%; margin-top: 10px; padding: 9px;
      background: var(--accent); color: white; border: none;
      border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    #btn-update-coords:hover { background: var(--accent-dk); }
    #btn-update-coords:disabled { background: var(--border2); cursor: not-allowed; }
    #hint-toast { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; border-radius: 100px; padding: 9px 18px; font-size: 13px; white-space: nowrap; box-shadow: var(--shadow-lg); z-index: 50; transition: opacity 0.4s; }
    .esri-ui-top-left { top: 12px !important; left: 12px !important; }
    .esri-widget--button, .esri-widget { border-radius: var(--radius-sm) !important; }
  </style>
</head>
<body>

<div id="loading-screen"><div class="spinner"></div><p id="loading-msg">Checking credentials...</p></div>

<div id="error-screen">
  <div class="error-card">
    <div style="font-size:36px">⚠️</div>
    <h2 id="error-title">Something went wrong</h2>
    <p id="error-msg"></p>
    <button class="btn-retry" onclick="location.reload()">Try again</button>
  </div>
</div>

<div id="app">
  <div id="header">
    <div class="header-logo"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
    <span id="app-title">Location Editor</span>
    <div id="layer-select-wrap" class="hidden"><select id="layer-select"></select></div>
    <div id="user-badge">
      <span id="user-name"></span>
      <button id="btn-signout">Sign out</button>
    </div>
  </div>
  <div id="map-wrap">
    <div id="viewDiv"></div>
    <div id="panel">
      <div id="panel-header">
        <div id="panel-header-label">Selected feature</div>
        <div id="panel-feature-name">—</div>
      </div>
      <div id="panel-body">
        <div id="empty-state">Click a point on the map to select it</div>
        <div id="point-details" style="display:none">
          <div class="coord-row">
            <div class="coord-box">
              <div class="coord-label">Latitude</div>
              <input class="coord-input" id="detail-lat" type="number" step="any" placeholder="0.000000"/>
            </div>
            <div class="coord-box">
              <div class="coord-label">Longitude</div>
              <input class="coord-input" id="detail-lon" type="number" step="any" placeholder="0.000000"/>
            </div>
          </div>
          <button id="btn-update-coords">Update Location</button>
          <div id="panel-hint"><span>↕</span><span>Or drag the point directly on the map</span></div>
        </div>
      </div>
      <div id="status-bar"><div id="status-dot"></div><span id="status-text">No feature selected</span></div>
    </div>
    <div id="hint-toast">👆 Click a point to select it, then drag to move</div>
  </div>
</div>

<script>
var CLIENT_ID    = "Wd85I6OWMyGPB5L1";
var REDIRECT_URI = "https://bay-park-data-solutions.github.io/location-editor/";
var DEFAULT_MAP_ID = "531827717dc8409f81a026abc3d01bd6";

function parseParams() {
  var p = new URLSearchParams(window.location.search);
  return {
    mapId:    p.get("map")      || DEFAULT_MAP_ID,
    title:    p.get("title")    || "Location Editor",
    org:      p.get("org")      || "",
    nameField: p.get("namefield") || "",   // e.g. ?namefield=WELL_NAME
    latField:  p.get("latfield")  || "",   // e.g. ?latfield=LATITUDE__N_
    lonField:  p.get("lonfield")  || ""    // e.g. ?lonfield=LONGITUDE__E_
  };
}

// nameFieldOverride is set from ?namefield= URL param
var nameFieldOverride = "";
var latFieldOverride  = "";
var lonFieldOverride  = "";

function guessNameField(attrs) {
  if (nameFieldOverride && nameFieldOverride in attrs) return nameFieldOverride;
  var candidates = ["Name","name","NAME","Title","title","TITLE","Label","label","WELL_NAME","well_name"];
  for (var i = 0; i < candidates.length; i++) { if (candidates[i] in attrs) return candidates[i]; }
  return Object.keys(attrs)[0] || "";
}

function getLatField(fields) {
  if (latFieldOverride && fields.indexOf(latFieldOverride) > -1) return latFieldOverride;
  var candidates = ["Latitude","latitude","LATITUDE","LATITUDE__N_","lat","LAT"];
  for (var i = 0; i < candidates.length; i++) { if (fields.indexOf(candidates[i]) > -1) return candidates[i]; }
  return null;
}

function getLonField(fields) {
  if (lonFieldOverride && fields.indexOf(lonFieldOverride) > -1) return lonFieldOverride;
  var candidates = ["Longitude","longitude","LONGITUDE","LONGITUDE__E_","lon","LON"];
  for (var i = 0; i < candidates.length; i++) { if (fields.indexOf(candidates[i]) > -1) return candidates[i]; }
  return null;
}

function showError(title, msg) {
  document.getElementById("loading-screen").classList.add("hidden");
  document.getElementById("error-title").textContent = title;
  document.getElementById("error-msg").textContent = msg;
  document.getElementById("error-screen").classList.add("visible");
}

require([
  "esri/identity/OAuthInfo",
  "esri/identity/IdentityManager",
  "esri/WebMap",
  "esri/views/MapView",
  "esri/layers/GraphicsLayer",
  "esri/Graphic",
  "esri/widgets/Home",
  "esri/widgets/ScaleBar"
], function(OAuthInfo, IdentityManager, WebMap, MapView, GraphicsLayer, Graphic, Home, ScaleBar) {

  var params = parseParams();
  var mapId  = params.mapId;
  var title  = params.title;
  var org    = params.org;
  nameFieldOverride = params.nameField;
  latFieldOverride  = params.latField;
  lonFieldOverride  = params.lonField;

  document.title = title;
  document.getElementById("app-title").textContent = title;

  var portalBase    = org ? "https://" + org + ".maps.arcgis.com" : "https://www.arcgis.com";
  var portalSharing = portalBase + "/sharing";

  // Full redirect OAuth — no popup, works in ALL browsers
  IdentityManager.registerOAuthInfos([new OAuthInfo({
    appId:     CLIENT_ID,
    portalUrl: portalBase,
    popup:     false,
    flowType:  "implicit"
  })]);

  document.getElementById("btn-signout").addEventListener("click", function() {
    IdentityManager.destroyCredentials();
    var url = REDIRECT_URI + "?map=" + mapId;
    if (org)   url += "&org=" + org;
    if (title !== "Location Editor") url += "&title=" + encodeURIComponent(title);
    location.href = url;
  });

  // Before OAuth redirect, save all URL params to sessionStorage so they
  // survive the round trip back from ArcGIS login
  if (window.location.search && !window.location.hash) {
    sessionStorage.setItem("esri_app_params", window.location.search);
  }

  // After OAuth redirect back, restore params from sessionStorage if URL only has hash
  if (window.location.hash && !window.location.search) {
    var savedParams = sessionStorage.getItem("esri_app_params");
    if (savedParams) {
      history.replaceState(null, "", window.location.pathname + savedParams);
      // Re-parse params with restored search string
      var restoredP = new URLSearchParams(savedParams);
      mapId         = restoredP.get("map")       || DEFAULT_MAP_ID;
      title         = restoredP.get("title")      || "Location Editor";
      org           = restoredP.get("org")        || "";
      nameFieldOverride = restoredP.get("namefield") || "";
      latFieldOverride  = restoredP.get("latfield")  || "";
      lonFieldOverride  = restoredP.get("lonfield")  || "";
      document.title = title;
      document.getElementById("app-title").textContent = title;
      // Rebuild portal URLs with restored org
      portalBase    = org ? "https://" + org + ".maps.arcgis.com" : "https://www.arcgis.com";
      portalSharing = portalBase + "/sharing";
      IdentityManager.registerOAuthInfos([new OAuthInfo({
        appId:     CLIENT_ID,
        portalUrl: portalBase,
        popup:     false,
        flowType:  "implicit"
      })]);
    }
  }

  // Clean up hash from URL
  if (window.location.hash) {
    history.replaceState(null, "", window.location.pathname + window.location.search);
  }

  // Check if already signed in, otherwise trigger redirect login
  IdentityManager.checkSignInStatus(portalSharing)
    .then(function(cred) {
      initApp(cred);
    })
    .catch(function() {
      document.getElementById("loading-msg").textContent = "Redirecting to sign in...";
      IdentityManager.getCredential(portalSharing)
        .then(function(cred) { initApp(cred); })
        .catch(function(err) {
          console.error("Auth error:", err);
          showError("Sign in failed", "Could not complete sign in. Please try again.");
        });
    });

  function initApp(credential) {
    document.getElementById("user-name").textContent = credential.userId || "";
    document.getElementById("app").classList.add("visible");
    document.getElementById("loading-screen").classList.add("hidden");

    var webmap = new WebMap({
      portalItem: {
        id: mapId,
        portal: { url: portalBase }
      }
    });
    var view = new MapView({ container: "viewDiv", map: webmap, ui: { components: [] } });
    view.ui.add(new Home({ view: view }), "top-left");
    view.ui.add(new ScaleBar({ view: view, unit: "metric" }), "bottom-left");

    var ghostLayer = new GraphicsLayer();
    webmap.add(ghostLayer);

    var activeLayer     = null;
    var activeLayerView = null;
    var selectedGraphic = null;
    var highlightHandle = null;
    var capturingDrag   = false;
    var hasMoved        = false;

    function setStatus(cls, txt) {
      document.getElementById("status-dot").className = cls;
      document.getElementById("status-text").textContent = txt;
    }

    function showDetails(name, lat, lon) {
      document.getElementById("panel-feature-name").textContent = name || "Unnamed";
      document.getElementById("empty-state").style.display = "none";
      document.getElementById("point-details").style.display = "block";
      document.getElementById("detail-lat").value = lat.toFixed(6);
      document.getElementById("detail-lon").value = lon.toFixed(6);
    }

    function clearSelection() {
      if (highlightHandle) { highlightHandle.remove(); highlightHandle = null; }
      selectedGraphic = null;
      ghostLayer.removeAll();
      document.getElementById("panel-feature-name").textContent = "—";
      document.getElementById("empty-state").style.display = "block";
      document.getElementById("point-details").style.display = "none";
      setStatus("", "No feature selected");
    }

    // Manual coordinate update button
    document.getElementById("btn-update-coords").addEventListener("click", function() {
      if (!selectedGraphic || !activeLayer) return;
      var lat = parseFloat(document.getElementById("detail-lat").value);
      var lon = parseFloat(document.getElementById("detail-lon").value);
      if (isNaN(lat) || isNaN(lon)) {
        setStatus("error", "Invalid coordinates — check values");
        return;
      }
      if (lat < -90 || lat > 90 || lon < -180 || lon > 180) {
        setStatus("error", "Coordinates out of range");
        return;
      }
      var newGeom = { latitude: lat, longitude: lon };
      // Move ghost to new position
      require(["esri/geometry/Point"], function(Point) {
        var pt = new Point({ latitude: lat, longitude: lon });
        ghostAt(pt);
        saveLocation(selectedGraphic, newGeom);
      });
    });

    // Allow pressing Enter in coordinate fields to trigger update
    document.getElementById("detail-lat").addEventListener("keydown", function(e) {
      if (e.key === "Enter") document.getElementById("btn-update-coords").click();
    });
    document.getElementById("detail-lon").addEventListener("keydown", function(e) {
      if (e.key === "Enter") document.getElementById("btn-update-coords").click();
    });

    function ghostAt(mapPoint) {
      ghostLayer.removeAll();
      ghostLayer.add(new Graphic({
        geometry: mapPoint,
        symbol: { type: "simple-marker", color: [251,146,60,0.95], size: 20, outline: { color: [255,255,255,1], width: 2.5 } }
      }));
    }

    function setActiveLayer(layer, allLayers) {
      clearSelection();
      // Hide all point layers except the selected one
      if (allLayers) {
        allLayers.forEach(function(l) { l.visible = (l === layer); });
      }
      activeLayer = layer;
      activeLayerView = null;
      view.whenLayerView(layer).then(function(lv) { activeLayerView = lv; });
    }

    view.when(function() {
      var allLayers = webmap.layers.toArray();
      Promise.all(allLayers.map(function(l) { return l.load().catch(function(){}); }))
        .then(function() {
          var pointLayers = allLayers.filter(function(l) { return l.type === "feature" && l.geometryType === "point"; });

          if (!pointLayers.length) {
            showError("No point layers found", "This web map does not contain any point feature layers.");
            return;
          }

          if (pointLayers.length > 1) {
            var selectEl = document.getElementById("layer-select");
            document.getElementById("layer-select-wrap").classList.remove("hidden");
            pointLayers.forEach(function(l, i) {
              var opt = document.createElement("option");
              opt.value = i;
              opt.textContent = l.title || ("Layer " + (i + 1));
              selectEl.appendChild(opt);
            });
            selectEl.addEventListener("change", function() { setActiveLayer(pointLayers[+selectEl.value], pointLayers); });
          }

          setActiveLayer(pointLayers[0], pointLayers);
        });
    }).catch(function(err) {
      console.error(err);
      showError("Map failed to load", "Could not load the web map. Check that the Map ID is correct and you have access to it.");
    });

    view.on("click", async function(evt) {
      if (hasMoved || !activeLayer) return;
      var hit = await view.hitTest(evt, { include: activeLayer });
      var res = hit.results[0];
      if (!res) { clearSelection(); return; }
      selectedGraphic = res.graphic;
      if (highlightHandle) highlightHandle.remove();
      if (activeLayerView) highlightHandle = activeLayerView.highlight(selectedGraphic);
      var nameField = guessNameField(selectedGraphic.attributes);
      showDetails(selectedGraphic.attributes[nameField], selectedGraphic.geometry.latitude, selectedGraphic.geometry.longitude);
      setStatus("", "Ready — drag the point to move it");
      document.getElementById("hint-toast").style.opacity = "0";
    });

    var surface = view.surface;

    surface.addEventListener("pointerdown", async function(e) {
      if (!selectedGraphic || !activeLayer || e.button !== 0) return;
      var hit = await view.hitTest({ x: e.offsetX, y: e.offsetY }, { include: activeLayer });
      var res = hit.results[0];
      if (!res) return;
      var oidField = activeLayer.objectIdField || "OBJECTID";
      if (res.graphic.attributes[oidField] !== selectedGraphic.attributes[oidField]) return;
      surface.setPointerCapture(e.pointerId);
      capturingDrag = true;
      hasMoved = false;
      e.preventDefault();
      e.stopPropagation();
    });

    surface.addEventListener("pointermove", function(e) {
      if (!capturingDrag || !selectedGraphic) return;
      hasMoved = true;
      var mp = view.toMap({ x: e.offsetX, y: e.offsetY });
      if (!mp) return;
      ghostAt(mp);
      var nameField = guessNameField(selectedGraphic.attributes);
      showDetails(selectedGraphic.attributes[nameField], mp.latitude, mp.longitude);
      setStatus("saving", "Dragging...");
      surface.style.cursor = "grabbing";
      e.preventDefault();
      e.stopPropagation();
    });

    surface.addEventListener("pointerup", async function(e) {
      if (!capturingDrag) return;
      surface.releasePointerCapture(e.pointerId);
      surface.style.cursor = "";
      capturingDrag = false;
      ghostLayer.removeAll();
      if (hasMoved && selectedGraphic) {
        var finalPoint = view.toMap({ x: e.offsetX, y: e.offsetY });
        if (finalPoint) await saveLocation(selectedGraphic, finalPoint);
      }
      setTimeout(function() { hasMoved = false; }, 50);
      e.preventDefault();
      e.stopPropagation();
    });

    view.on("drag", function(e) { if (capturingDrag) e.stopPropagation(); });

    async function saveLocation(graphic, newGeom) {
      setStatus("saving", "Saving to database...");
      var oidField = activeLayer.objectIdField || "OBJECTID";
      var oid = graphic.attributes[oidField];
      if (!oid) { setStatus("error", "Could not identify feature"); return; }

      var attrs = {};
      attrs[oidField] = oid;

      // Only update coordinate fields if they exist in the layer schema
      var fields = activeLayer.fields.map(function(f) { return f.name; });
      var latF = getLatField(fields);
      var lonF = getLonField(fields);
      if (latF) attrs[latF] = parseFloat(lat.toFixed(6));
      if (lonF) attrs[lonF] = parseFloat(lon.toFixed(6));

      // newGeom can be an ArcGIS Point object or a plain {latitude, longitude} object
      var lat = newGeom.latitude;
      var lon = newGeom.longitude;

      var updated = {
        attributes: attrs,
        geometry: { type: "point", x: lon, y: lat, spatialReference: { wkid: 4326 } }
      };

      try {
        var result = await activeLayer.applyEdits({ updateFeatures: [updated] });
        if (result.updateFeatureResults[0] && result.updateFeatureResults[0].error) {
          throw new Error(result.updateFeatureResults[0].error.message);
        }
        Object.assign(graphic.attributes, attrs);
        var nameField = guessNameField(graphic.attributes);
        showDetails(graphic.attributes[nameField], newGeom.latitude, newGeom.longitude);
        setStatus("saved", "Saved to database");
        setTimeout(function() { setStatus("", "Ready — drag the point to move it"); }, 3000);
      } catch(err) {
        console.error("applyEdits error:", err);
        setStatus("error", "Save failed — check browser console");
      }
    }

  } // end initApp
}); // end require
</script>
</body>
</html>
