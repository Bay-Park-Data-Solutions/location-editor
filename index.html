<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Location Editor</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css"/>
  <script src="https://js.arcgis.com/4.29/"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f6f8;
      --surface:   #ffffff;
      --surface2:  #f0f2f5;
      --border:    #e2e5ea;
      --border2:   #cdd1d9;
      --accent:    #0070f3;
      --success:   #16a34a;
      --warn:      #d97706;
      --danger:    #dc2626;
      --text:      #111318;
      --text-2:    #4b5360;
      --text-3:    #8a93a3;
      --radius:    10px;
      --radius-sm: 6px;
      --shadow:    0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── LOADING ── */
    #loading-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 300;
    }
    #loading-screen.hidden { display: none; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p { font-size: 14px; color: var(--text-3); }

    /* ── ERROR ── */
    #error-screen { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 300; }
    #error-screen.visible { display: flex; }
    .error-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 48px; width: 420px; max-width: 90vw;
      box-shadow: var(--shadow-lg); text-align: center; display: flex; flex-direction: column; gap: 16px;
    }
    .error-card h2 { font-size: 18px; font-weight: 600; }
    .error-card p { font-size: 14px; color: var(--text-2); line-height: 1.6; }
    .error-card code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: 'JetBrains Mono', monospace; }

    /* ── APP ── */
    #app { position: fixed; inset: 0; display: none; flex-direction: column; }
    #app.visible { display: flex; }

    /* Header */
    #header {
      height: 52px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; z-index: 100;
    }
    .header-logo { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-logo svg { width: 16px; height: 16px; fill: white; }
    #app-title { font-size: 14px; font-weight: 600; white-space: nowrap; }

    /* Layer picker — only shown for multi-layer maps */
    #layer-select-wrap { margin-left: 8px; }
    #layer-select-wrap.hidden { display: none; }
    #layer-select {
      height: 32px; padding: 0 10px; border: 1px solid var(--border2);
      border-radius: var(--radius-sm); font-size: 13px; font-family: inherit;
      background: var(--surface2); color: var(--text); cursor: pointer; outline: none; max-width: 260px;
    }
    #layer-select:focus { border-color: var(--accent); }

    #user-badge { margin-left: auto; }
    #user-name { font-size: 13px; color: var(--text-2); }

    /* Map */
    #map-wrap { flex: 1; position: relative; }
    #viewDiv { position: absolute; inset: 0; }

    /* Panel */
    #panel {
      position: absolute; top: 12px; right: 12px; width: 280px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; z-index: 50;
    }
    #panel-header { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    #panel-header-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-3); }
    #panel-feature-name { font-size: 15px; font-weight: 600; margin-top: 2px; }
    #panel-body { padding: 14px; }
    #empty-state { font-size: 13px; color: var(--text-3); line-height: 1.6; text-align: center; padding: 4px 0 8px; }

    .coord-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .coord-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; }
    .coord-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-3); margin-bottom: 3px; }
    .coord-value { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 500; }

    #panel-hint { font-size: 12px; color: var(--text-3); margin-top: 12px; display: flex; align-items: flex-start; gap: 6px; line-height: 1.5; }

    #status-bar { display: flex; align-items: center; gap: 7px; padding: 9px 14px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-3); }
    #status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); flex-shrink: 0; transition: background 0.25s; }
    #status-dot.saving { background: var(--warn); animation: blink 0.7s infinite; }
    #status-dot.saved  { background: var(--success); }
    #status-dot.error  { background: var(--danger); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    #hint-toast {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: white; border-radius: 100px;
      padding: 9px 18px; font-size: 13px; white-space: nowrap;
      box-shadow: var(--shadow-lg); z-index: 50; transition: opacity 0.4s;
    }

    .esri-ui-top-left { top: 12px !important; left: 12px !important; }
    .esri-widget--button, .esri-widget { border-radius: var(--radius-sm) !important; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p>Loading your map…</p>
</div>

<!-- Error -->
<div id="error-screen">
  <div class="error-card">
    <div style="font-size:36px">⚠️</div>
    <h2 id="error-title">Something went wrong</h2>
    <p id="error-msg"></p>
  </div>
</div>

<!-- App -->
<div id="app">
  <div id="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </div>
    <span id="app-title">Location Editor</span>
    <div id="layer-select-wrap" class="hidden">
      <select id="layer-select"></select>
    </div>
    <div id="user-badge">
      <span id="user-name"></span>
    </div>
  </div>

  <div id="map-wrap">
    <div id="viewDiv"></div>

    <div id="panel">
      <div id="panel-header">
        <div id="panel-header-label">Selected feature</div>
        <div id="panel-feature-name">—</div>
      </div>
      <div id="panel-body">
        <div id="empty-state">Click a point on the map to select it</div>
        <div id="point-details" style="display:none">
          <div class="coord-row">
            <div class="coord-box">
              <div class="coord-label">Latitude</div>
              <div class="coord-value" id="detail-lat">—</div>
            </div>
            <div class="coord-box">
              <div class="coord-label">Longitude</div>
              <div class="coord-value" id="detail-lon">—</div>
            </div>
          </div>
          <div id="panel-hint">
            <span>↕</span>
            <span>Drag the selected point to update its location</span>
          </div>
        </div>
      </div>
      <div id="status-bar">
        <div id="status-dot"></div>
        <span id="status-text">No feature selected</span>
      </div>
    </div>

    <div id="hint-toast">👆 Click a point to select it, then drag to move</div>
  </div>
</div>

<script>
// ── URL PARAMS ────────────────────────────────────────────────────
// Single web map:   ?map=WEBMAP_ITEM_ID
// Custom title:     ?map=WEBMAP_ITEM_ID&title=My Map
// ─────────────────────────────────────────────────────────────────

function parseParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    mapId: p.get("map") || "",
    title: p.get("title") || "Location Editor"
  };
}

function guessNameField(attrs) {
  const candidates = ["Name","name","NAME","Title","title","TITLE","Label","label"];
  for (const c of candidates) { if (c in attrs) return c; }
  return Object.keys(attrs)[0] || "";
}

function showError(title, msg) {
  document.getElementById("loading-screen").classList.add("hidden");
  document.getElementById("error-title").textContent = title;
  document.getElementById("error-msg").textContent = msg;
  document.getElementById("error-screen").classList.add("visible");
}

require([
  "esri/identity/IdentityManager",
  "esri/WebMap",
  "esri/views/MapView",
  "esri/layers/GraphicsLayer",
  "esri/Graphic",
  "esri/widgets/Home",
  "esri/widgets/ScaleBar"
], function(IdentityManager, WebMap, MapView, GraphicsLayer, Graphic, Home, ScaleBar) {

  const { mapId, title } = parseParams();
  document.title = title;
  document.getElementById("app-title").textContent = title;

  // No map ID → show error
  if (!mapId) {
    showError(
      "Configuration Error",
      "No Web Map ID was provided. The iframe src must include a ?map= parameter with the ArcGIS Web Map item ID."
    );
    return;
  }

  // Pick up the existing ArcGIS Online session silently
  IdentityManager.checkSignInStatus("https://www.arcgis.com/sharing")
    .then(cred => initApp(cred))
    .catch(() => {
      showError(
        "Session not found",
        "Please open this app from your ArcGIS Online Experience Builder page. You need to be signed into ArcGIS Online first."
      );
    });

  // ── Init ──────────────────────────────────────────────────────
  function initApp(credential) {

    document.getElementById("user-name").textContent = credential.userId || "";

    // Load the Web Map — this brings in all layers, symbology, labels, basemap
    const webmap = new WebMap({ portalItem: { id: mapId } });

    const view = new MapView({
      container: "viewDiv",
      map: webmap,
      ui: { components: [] }
    });

    view.ui.add(new Home({ view }), "top-left");
    view.ui.add(new ScaleBar({ view, unit: "metric" }), "bottom-left");

    const ghostLayer = new GraphicsLayer();
    webmap.add(ghostLayer);

    // State
    let editableLayers    = [];   // all point FeatureLayers found in the map
    let activeLayer       = null;
    let activeLayerView   = null;
    let selectedGraphic   = null;
    let highlightHandle   = null;
    let capturingDrag     = false;
    let hasMoved          = false;

    function setStatus(cls, txt) {
      document.getElementById("status-dot").className = cls;
      document.getElementById("status-text").textContent = txt;
    }

    function showDetails(name, lat, lon) {
      document.getElementById("panel-feature-name").textContent = name || "Unnamed";
      document.getElementById("empty-state").style.display = "none";
      document.getElementById("point-details").style.display = "block";
      document.getElementById("detail-lat").textContent = lat.toFixed(6);
      document.getElementById("detail-lon").textContent = lon.toFixed(6);
    }

    function clearSelection() {
      if (highlightHandle) { highlightHandle.remove(); highlightHandle = null; }
      selectedGraphic = null;
      ghostLayer.removeAll();
      document.getElementById("panel-feature-name").textContent = "—";
      document.getElementById("empty-state").style.display = "block";
      document.getElementById("point-details").style.display = "none";
      setStatus("", "No feature selected");
    }

    function ghostAt(mapPoint) {
      ghostLayer.removeAll();
      ghostLayer.add(new Graphic({
        geometry: mapPoint,
        symbol: { type: "simple-marker", color: [251,146,60,0.95], size: 20, outline: { color: [255,255,255,1], width: 2.5 } }
      }));
    }

    // Once the map loads, find all editable point layers
    view.when(() => {
      document.getElementById("loading-screen").classList.add("hidden");
      document.getElementById("app").classList.add("visible");

      // Collect all point FeatureLayers from the web map
      editableLayers = webmap.layers.filter(l =>
        l.type === "feature" && l.geometryType === "point"
      ).toArray();

      if (!editableLayers.length) {
        showError("No point layers found", "This web map doesn't contain any point feature layers that can be edited.");
        return;
      }

      // If multiple point layers → show dropdown so user can pick which to edit
      if (editableLayers.length > 1) {
        const selectEl = document.getElementById("layer-select");
        document.getElementById("layer-select-wrap").classList.remove("hidden");
        editableLayers.forEach((l, i) => {
          const opt = document.createElement("option");
          opt.value = i;
          opt.textContent = l.title || `Layer ${i + 1}`;
          selectEl.appendChild(opt);
        });
        selectEl.addEventListener("change", () => setActiveLayer(editableLayers[+selectEl.value]));
      }

      setActiveLayer(editableLayers[0]);

    }).catch(err => {
      console.error(err);
      showError("Map failed to load", "Could not load the web map. Make sure the Map ID is correct and you have access to it.");
    });

    function setActiveLayer(layer) {
      clearSelection();
      activeLayer = layer;
      activeLayerView = null;
      view.whenLayerView(layer).then(lv => { activeLayerView = lv; });
    }

    // Click → select
    view.on("click", async (evt) => {
      if (hasMoved || !activeLayer) return;
      const hit = await view.hitTest(evt, { include: activeLayer });
      const res = hit.results[0];
      if (!res) { clearSelection(); return; }

      selectedGraphic = res.graphic;
      if (highlightHandle) highlightHandle.remove();
      if (activeLayerView) highlightHandle = activeLayerView.highlight(selectedGraphic);

      const nameField = guessNameField(selectedGraphic.attributes);
      showDetails(
        selectedGraphic.attributes[nameField],
        selectedGraphic.geometry.latitude,
        selectedGraphic.geometry.longitude
      );
      setStatus("", "Ready — drag the point to move it");
      document.getElementById("hint-toast").style.opacity = "0";
    });

    // Pointer drag
    const surface = view.surface;

    surface.addEventListener("pointerdown", async (e) => {
      if (!selectedGraphic || !activeLayer || e.button !== 0) return;
      const hit = await view.hitTest({ x: e.offsetX, y: e.offsetY }, { include: activeLayer });
      const res = hit.results[0];
      if (!res) return;
      const oidField = activeLayer.objectIdField || "OBJECTID";
      if (res.graphic.attributes[oidField] !== selectedGraphic.attributes[oidField]) return;
      surface.setPointerCapture(e.pointerId);
      capturingDrag = true;
      hasMoved = false;
      e.preventDefault();
      e.stopPropagation();
    });

    surface.addEventListener("pointermove", (e) => {
      if (!capturingDrag || !selectedGraphic) return;
      hasMoved = true;
      const mp = view.toMap({ x: e.offsetX, y: e.offsetY });
      if (!mp) return;
      ghostAt(mp);
      const nameField = guessNameField(selectedGraphic.attributes);
      showDetails(selectedGraphic.attributes[nameField], mp.latitude, mp.longitude);
      setStatus("saving", "Dragging…");
      surface.style.cursor = "grabbing";
      e.preventDefault();
      e.stopPropagation();
    });

    surface.addEventListener("pointerup", async (e) => {
      if (!capturingDrag) return;
      surface.releasePointerCapture(e.pointerId);
      surface.style.cursor = "";
      capturingDrag = false;
      ghostLayer.removeAll();
      if (hasMoved && selectedGraphic) {
        const finalPoint = view.toMap({ x: e.offsetX, y: e.offsetY });
        if (finalPoint) await saveLocation(selectedGraphic, finalPoint);
      }
      setTimeout(() => { hasMoved = false; }, 50);
      e.preventDefault();
      e.stopPropagation();
    });

    view.on("drag", (e) => { if (capturingDrag) e.stopPropagation(); });

    // Save
    async function saveLocation(graphic, newGeom) {
      setStatus("saving", "Saving to database…");
      const oidField = activeLayer.objectIdField || "OBJECTID";
      const oid = graphic.attributes[oidField];
      if (!oid) { setStatus("error", "Could not identify feature"); return; }

      const attrs = { [oidField]: oid };
      if ("Latitude"  in graphic.attributes) attrs.Latitude  = parseFloat(newGeom.latitude.toFixed(6));
      if ("Longitude" in graphic.attributes) attrs.Longitude = parseFloat(newGeom.longitude.toFixed(6));
      if ("latitude"  in graphic.attributes) attrs.latitude  = parseFloat(newGeom.latitude.toFixed(6));
      if ("longitude" in graphic.attributes) attrs.longitude = parseFloat(newGeom.longitude.toFixed(6));

      const updated = {
        attributes: attrs,
        geometry: { type: "point", x: newGeom.longitude, y: newGeom.latitude, spatialReference: { wkid: 4326 } }
      };

      try {
        const result = await activeLayer.applyEdits({ updateFeatures: [updated] });
        if (result.updateFeatureResults[0]?.error) throw new Error(result.updateFeatureResults[0].error.message);
        Object.assign(graphic.attributes, attrs);
        const nameField = guessNameField(graphic.attributes);
        showDetails(graphic.attributes[nameField], newGeom.latitude, newGeom.longitude);
        setStatus("saved", "✓ Saved to database");
        setTimeout(() => setStatus("", "Ready — drag the point to move it"), 3000);
      } catch (err) {
        console.error("applyEdits error:", err);
        setStatus("error", "Save failed — check browser console");
      }
    }

  } // end initApp

}); // end require
</script>
</body>
</html>
